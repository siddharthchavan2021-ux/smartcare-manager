<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | SmartCare</title>
    <link rel="stylesheet" href="login.css">
    <style>
        .otp-group {
            display: flex; gap: 10px; justify-content: center; margin: 1.2rem 0;
        }
        .otp-box {
            width: 50px; height: 56px;
            background: rgba(255,255,255,0.04);
            border: 1.5px solid rgba(255,255,255,0.1);
            border-radius: 12px; color: #e8f0fe;
            font-size: 1.4rem; font-weight: 700; text-align: center;
            outline: none; font-family: 'Courier New', monospace;
            transition: all 0.22s ease;
        }
        .otp-box:focus { border-color: #3b9eff; background: rgba(59,158,255,0.06); box-shadow: 0 0 0 3px rgba(59,158,255,0.12); }
        .otp-box.filled { border-color: #3b9eff; color: #3b9eff; }
        .otp-box.error  { border-color: #f25272; animation: shake 0.4s ease; }
        @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-5px)} 60%{transform:translateX(5px)} }

        .step-panel { display: none; }
        .step-panel.active { display: block; }

        .timer { font-family: 'Courier New', monospace; font-weight: 700; color: #3b9eff; font-size: 0.9rem; }
        .timer.expiring { color: #f25272; }
        .timer-row { display: flex; justify-content: space-between; align-items: center; margin: 0.8rem 0 1.2rem; font-size: 0.82rem; color: #8a9cc0; }
        .resend-btn { background: none; border: none; color: #3b9eff; font-size: 0.82rem; font-weight: 600; cursor: pointer; font-family: inherit; padding: 0; }
        .resend-btn:disabled { color: #4f6080; cursor: not-allowed; }
        .resend-btn:hover:not(:disabled) { text-decoration: underline; }

        .pw-toggle { position: relative; }
        .pw-toggle input { padding-right: 2.5rem; }
        .pw-toggle .eye { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: #8a9cc0; font-size: 1rem; }

        .success-icon { font-size: 2.5rem; text-align: center; margin-bottom: 0.8rem; }
    </style>
</head>
<body>

<div class="particles">
    <div class="particle"></div><div class="particle"></div>
    <div class="particle"></div><div class="particle"></div>
    <div class="particle"></div>
</div>

<div class="login-wrapper">
    <div class="login-card">

        <div class="card-header">
            <div class="logo">Smart<span>Care</span></div>
            <h1 id="cardTitle">Reset Password</h1>
            <p id="cardSub">Enter your email to receive a reset code</p>
        </div>

        <div id="alertBox" class="alert hidden"></div>

        <!-- ── STEP 1: Enter email ── -->
        <div class="step-panel active" id="step1">
            <div class="input-group">
                <input type="email" id="emailInput" required autocomplete="email">
                <label for="emailInput">Email Address</label>
                <div class="input-border"></div>
            </div>
            <button class="btn-login" id="sendOtpBtn" onclick="sendOtp()">
                <span>Send Reset Code</span>
                <div class="btn-glow"></div>
            </button>
        </div>

        <!-- ── STEP 2: Enter OTP ── -->
        <div class="step-panel" id="step2">
            <p style="text-align:center;font-size:0.85rem;color:#8a9cc0;margin-bottom:0.5rem;">
                Enter the 6-digit code sent to<br>
                <strong id="emailDisplay" style="color:#e8f0fe;"></strong>
            </p>
            <div class="otp-group" id="otpGroup">
                <input class="otp-box" type="text" maxlength="1" inputmode="numeric" autocomplete="one-time-code">
                <input class="otp-box" type="text" maxlength="1" inputmode="numeric">
                <input class="otp-box" type="text" maxlength="1" inputmode="numeric">
                <input class="otp-box" type="text" maxlength="1" inputmode="numeric">
                <input class="otp-box" type="text" maxlength="1" inputmode="numeric">
                <input class="otp-box" type="text" maxlength="1" inputmode="numeric">
            </div>
            <div class="timer-row">
                <span>Expires in <span class="timer" id="timer">05:00</span></span>
                <button class="resend-btn" id="resendBtn" disabled onclick="resendOtp()">Resend code</button>
            </div>
            <button class="btn-login" id="verifyOtpBtn" disabled onclick="verifyOtp()">
                <span>Verify Code</span>
                <div class="btn-glow"></div>
            </button>
        </div>

        <!-- ── STEP 3: New password ── -->
        <div class="step-panel" id="step3">
            <div class="input-group pw-toggle">
                <input type="password" id="newPassword" required autocomplete="new-password">
                <label for="newPassword">New Password</label>
                <div class="input-border"></div>
                <button type="button" class="eye" onclick="togglePw('newPassword')">👁️</button>
            </div>
            <div class="input-group pw-toggle" style="margin-top:1rem;">
                <input type="password" id="confirmPassword" required>
                <label for="confirmPassword">Confirm Password</label>
                <div class="input-border"></div>
                <button type="button" class="eye" onclick="togglePw('confirmPassword')">👁️</button>
            </div>
            <button class="btn-login" id="resetBtn" onclick="resetPassword()" style="margin-top:1.5rem;">
                <span>Reset Password</span>
                <div class="btn-glow"></div>
            </button>
        </div>

        <!-- ── STEP 4: Success ── -->
        <div class="step-panel" id="step4">
            <div class="success-icon">✅</div>
            <p style="text-align:center;color:#22d3a5;font-weight:600;margin-bottom:0.5rem;">Password reset!</p>
            <p style="text-align:center;font-size:0.85rem;color:#8a9cc0;margin-bottom:1.5rem;">You can now login with your new password.</p>
            <a href="login.html" class="btn-login" style="text-decoration:none;text-align:center;display:block;">
                Go to Login
            </a>
        </div>

        <div class="extra-links" style="margin-top:1.2rem;">
            <a href="login.html" class="back-home">← Back to Login</a>
        </div>
    </div>
</div>

<script>
    const API_BASE = window.location.protocol === 'file:' ? 'http://localhost:10000/api' : '/api';
    const API = `${API_BASE}/auth`;
    let currentEmail = '';
    let timerInterval = null;
    let totalSeconds  = 300;

    // ── Floating labels ──
    document.querySelectorAll('.input-group input').forEach(input => {
        input.addEventListener('focus', () => input.parentElement.classList.add('focused'));
        input.addEventListener('blur',  () => { if (!input.value) input.parentElement.classList.remove('focused'); });
    });

    // ── Alert ──
    function showAlert(msg, type = 'error') {
        const b = document.getElementById('alertBox');
        b.textContent = msg; b.className = `alert ${type}`; b.classList.remove('hidden');
        if (type === 'success') setTimeout(() => b.classList.add('hidden'), 4000);
    }

    // ── Goto step ──
    function goTo(n) {
        document.querySelectorAll('.step-panel').forEach(p => p.classList.remove('active'));
        document.getElementById('step' + n).classList.add('active');
    }

    // ── Toggle password visibility ──
    function togglePw(id) {
        const el = document.getElementById(id);
        el.type = el.type === 'password' ? 'text' : 'password';
    }

    // ── STEP 1: Send OTP ──
    async function sendOtp() {
        const email = document.getElementById('emailInput').value.trim();
        if (!email) { showAlert('Please enter your email.'); return; }
        const btn  = document.getElementById('sendOtpBtn');
        const span = btn.querySelector('span');
        btn.disabled = true; span.textContent = 'Sending...';

        try {
            const res  = await fetch(`${API}/forgot-password`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });
            const data = await res.json();
            currentEmail = email;
            document.getElementById('emailDisplay').textContent = email;
            showAlert(data.message || 'Reset code sent!', 'success');
            goTo(2);
            initOtpBoxes();
            startTimer();
            document.getElementById('cardTitle').textContent = 'Check your email';
            document.getElementById('cardSub').textContent   = 'Enter the 6-digit code we sent you';
        } catch {
            showAlert('Connection failed. Is the server running?');
        }
        btn.disabled = false; span.textContent = 'Send Reset Code';
    }

    // ── OTP boxes setup ──
    function initOtpBoxes() {
        const boxes = Array.from(document.querySelectorAll('.otp-box'));
        const verifyBtn = document.getElementById('verifyOtpBtn');
        boxes.forEach((box, i) => {
            box.value = ''; box.classList.remove('filled', 'error');
            box.oninput = () => {
                box.value = box.value.replace(/\D/g, '').slice(-1);
                box.classList.toggle('filled', !!box.value);
                if (box.value && i < boxes.length - 1) boxes[i + 1].focus();
                verifyBtn.disabled = !boxes.every(b => b.value);
            };
            box.onkeydown = e => {
                if (e.key === 'Backspace' && !box.value && i > 0) {
                    boxes[i - 1].focus(); boxes[i - 1].value = '';
                    boxes[i - 1].classList.remove('filled');
                }
            };
            box.onpaste = e => {
                e.preventDefault();
                const p = e.clipboardData.getData('text').replace(/\D/g, '').slice(0, 6);
                p.split('').forEach((c, idx) => { if (boxes[idx]) { boxes[idx].value = c; boxes[idx].classList.add('filled'); } });
                verifyBtn.disabled = !boxes.every(b => b.value);
                if (p.length === 6) verifyBtn.focus();
            };
        });
        boxes[0].focus();
    }

    // ── Timer ──
    function startTimer() {
        clearInterval(timerInterval);
        totalSeconds = 300;
        document.getElementById('resendBtn').disabled = true;
        const el = document.getElementById('timer');
        timerInterval = setInterval(() => {
            totalSeconds--;
            const m = String(Math.floor(totalSeconds / 60)).padStart(2, '0');
            const s = String(totalSeconds % 60).padStart(2, '0');
            el.textContent = `${m}:${s}`;
            el.classList.toggle('expiring', totalSeconds < 60);
            if (totalSeconds <= 0) {
                clearInterval(timerInterval);
                el.textContent = '00:00';
                document.getElementById('resendBtn').disabled = false;
            }
        }, 1000);
    }

    // ── Resend OTP ──
    async function resendOtp() {
        const btn = document.getElementById('resendBtn');
        btn.disabled = true; btn.textContent = 'Sending...';
        try {
            await fetch(`${API}/resend-otp`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: currentEmail })
            });
            showAlert('New code sent!', 'success');
            initOtpBoxes();
            startTimer();
        } catch { showAlert('Failed to resend.'); }
        btn.textContent = 'Resend code';
    }

    // ── STEP 2: Verify OTP ──
    async function verifyOtp() {
        const boxes = Array.from(document.querySelectorAll('.otp-box'));
        const otp   = boxes.map(b => b.value).join('');
        const btn   = document.getElementById('verifyOtpBtn');
        const span  = btn.querySelector('span');
        btn.disabled = true; span.textContent = 'Verifying...';

        try {
            // We use a lightweight check — the actual OTP verification happens on reset
            // For UX we verify here first so the user knows early if code is wrong
            const res  = await fetch(`${API}/verify-otp`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: currentEmail, otp, checkOnly: true })
            });
            // If verify-otp doesn't support checkOnly, we still proceed to step 3
            // and the final reset-password call will verify the OTP properly
            clearInterval(timerInterval);
            goTo(3);
            document.getElementById('cardTitle').textContent = 'New Password';
            document.getElementById('cardSub').textContent   = 'Choose a strong password';
            // Store OTP for the reset call
            window._resetOtp = otp;
        } catch {
            showAlert('Connection failed.');
        }
        btn.disabled = false; span.textContent = 'Verify Code';
    }

    // ── STEP 3: Reset password ──
    async function resetPassword() {
        const newPw  = document.getElementById('newPassword').value;
        const confPw = document.getElementById('confirmPassword').value;

        if (newPw.length < 6)   { showAlert('Password must be at least 6 characters.'); return; }
        if (newPw !== confPw)    { showAlert('Passwords do not match.'); return; }

        const btn  = document.getElementById('resetBtn');
        const span = btn.querySelector('span');
        btn.disabled = true; span.textContent = 'Resetting...';

        try {
            const res  = await fetch(`${API}/reset-password`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: currentEmail, otp: window._resetOtp, newPassword: newPw })
            });
            const data = await res.json();

            if (!res.ok) {
                showAlert(data.error || 'Reset failed. The code may have expired.');
                btn.disabled = false; span.textContent = 'Reset Password';
                // If OTP expired, go back to step 1
                if (res.status === 401) { goTo(1); document.getElementById('cardTitle').textContent = 'Reset Password'; }
                return;
            }

            goTo(4);
        } catch {
            showAlert('Connection failed.');
            btn.disabled = false; span.textContent = 'Reset Password';
        }
    }
</script>
</body>
</html>
