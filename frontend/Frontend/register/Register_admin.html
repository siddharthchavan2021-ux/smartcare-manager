<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Registration | SmartCare</title>
    <link rel="stylesheet" href="register.css">
</head>
<body>

<div class="particles">
    <div class="particle"></div><div class="particle"></div>
    <div class="particle"></div><div class="particle"></div>
    <div class="particle"></div>
</div>

<div class="register-wrapper">
    <div class="register-card">
        <div class="card-header">
            <div class="icon-badge admin">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="8" r="4"></circle>
                    <path d="M12 14c-5 0-8 2-8 3v1h16v-1c0-1-3-3-8-3z"></path>
                    <path d="M17 3l2 2-2 2M7 3L5 5l2 2"></path>
                </svg>
            </div>
            <h1>Admin Registration</h1>
            <p>System administration access</p>
            <div class="security-badge">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                </svg>
                <span>Secure Access Required</span>
            </div>
        </div>

        <div id="alertBox" class="alert hidden"></div>

        <form id="adminForm">
            <div class="form-section">
                <h3 class="section-title">Administrator Information</h3>
                <div class="form-row">
                    <div class="input-group">
                        <input type="text" id="firstName" required>
                        <label for="firstName">First Name</label>
                    </div>
                    <div class="input-group">
                        <input type="text" id="lastName" required>
                        <label for="lastName">Last Name</label>
                    </div>
                </div>
                <div class="input-group">
                    <input type="email" id="email" required>
                    <label for="email">Official Email Address</label>
                </div>
                <div class="form-row">
                    <div class="input-group">
                        <input type="tel" id="phone" required>
                        <label for="phone">Phone Number</label>
                    </div>
                    <div class="input-group">
                        <input type="text" id="employeeId" required>
                        <label for="employeeId">Employee ID</label>
                    </div>
                </div>
            </div>

            <div class="form-section">
                <h3 class="section-title">Access Level & Department</h3>
                <div class="form-row">
                    <div class="input-group select-group">
                        <select id="department" required>
                            <option value="" disabled selected></option>
                            <option value="IT & Systems">IT & Systems</option>
                            <option value="Healthcare Operations">Healthcare Operations</option>
                            <option value="Finance & Billing">Finance & Billing</option>
                            <option value="Human Resources">Human Resources</option>
                            <option value="General Management">General Management</option>
                        </select>
                        <label for="department">Department</label>
                        <div class="select-arrow">▼</div>
                    </div>
                    <div class="input-group select-group">
                        <select id="accessLevel" required>
                            <option value="" disabled selected></option>
                            <option value="Super Admin">Super Admin</option>
                            <option value="Admin">Admin</option>
                            <option value="Moderator">Moderator</option>
                        </select>
                        <label for="accessLevel">Access Level</label>
                        <div class="select-arrow">▼</div>
                    </div>
                </div>
                <div class="input-group">
                    <input type="text" id="jobTitle" required>
                    <label for="jobTitle">Job Title</label>
                </div>
            </div>

            <div class="form-section">
                <h3 class="section-title">Authorization & Security</h3>
                <div class="input-group">
                    <input type="text" id="authCode" required>
                    <label for="authCode">Authorization Code</label>
                    <div class="field-hint">Contact IT admin for authorization code</div>
                </div>
                <div class="input-group">
                    <input type="password" id="password" required autocomplete="new-password">
                    <label for="password">Password (min. 12 characters)</label>
                    <div class="password-strength" id="passwordStrength"></div>
                </div>
                <div class="input-group">
                    <input type="password" id="confirmPassword" required>
                    <label for="confirmPassword">Confirm Password</label>
                </div>
            </div>

            <div class="terms-checkbox">
                <label class="checkbox-label">
                    <input type="checkbox" required>
                    <span class="checkmark"></span>
                    <span>I agree to the <a href="#">Admin Code of Conduct</a> and <a href="#">Data Protection Policy</a></span>
                </label>
            </div>
            <div class="terms-checkbox">
                <label class="checkbox-label">
                    <input type="checkbox" required>
                    <span class="checkmark"></span>
                    <span>I acknowledge that admin access carries significant responsibilities and will use it ethically</span>
                </label>
            </div>

            <button type="submit" class="btn-register" id="submitBtn">
                <span>Submit Admin Registration</span>
                <div class="btn-glow"></div>
            </button>
        </form>

        <div class="extra-links">
            <p>Already have an account? <a href="../login/login.html">Login here</a></p>
            <a href="../index/index.html" class="back-home">← Back to Home</a>
        </div>
    </div>
</div>

<script>
    // FIX: Updated to /api/auth to match the fixed AuthController
    const API_BASE = window.location.protocol === 'file:' ? 'http://localhost:10000/api' : '/api';
    const API = `${API_BASE}/auth`;

    document.addEventListener('DOMContentLoaded', () => {
        document.querySelectorAll('.input-group input, .input-group select').forEach(el => {
            if (el.value) el.closest('.input-group').classList.add('focused');
            el.addEventListener('focus', () => el.closest('.input-group').classList.add('focused'));
            el.addEventListener('blur',  () => {
                if (!el.value) el.closest('.input-group').classList.remove('focused');
            });
            if (el.tagName === 'SELECT') {
                el.addEventListener('change', () => {
                    if (el.value) el.closest('.input-group').classList.add('focused');
                });
            }
        });
    });

    // Password strength meter
    document.getElementById('password').addEventListener('input', function () {
        const p = this.value;
        let s = 0;
        if (p.length >= 8)  s++;
        if (p.length >= 12) s++;
        if (/[a-z]/.test(p) && /[A-Z]/.test(p)) s++;
        if (/\d/.test(p)) s++;
        if (/[^a-zA-Z\d]/.test(p)) s++;
        const levels = ['', 'Weak', 'Fair', 'Good', 'Strong', 'Very Strong'];
        const colors = ['', '#f87171', '#fb923c', '#facc15', '#34d399', '#10b981'];
        const el = document.getElementById('passwordStrength');
        el.textContent  = p ? levels[s] : '';
        el.style.color  = colors[s];
    });

    function showAlert(message, type = 'error') {
        const box = document.getElementById('alertBox');
        box.textContent = message;
        box.className = `alert ${type}`;
    }

    document.getElementById('adminForm').addEventListener('submit', async function (e) {
        e.preventDefault();

        const pass    = document.getElementById('password').value;
        const confirm = document.getElementById('confirmPassword').value;

        if (pass !== confirm) { showAlert('Passwords do not match!'); return; }
        if (pass.length < 12) { showAlert('Admin password must be at least 12 characters!'); return; }
        if (!/[a-z]/.test(pass) || !/[A-Z]/.test(pass) || !/\d/.test(pass) || !/[^a-zA-Z\d]/.test(pass)) {
            showAlert('Password must contain uppercase, lowercase, number and special character!');
            return;
        }

        const btn  = document.getElementById('submitBtn');
        const span = btn.querySelector('span');
        btn.disabled = true;
        span.textContent = 'Verifying Credentials...';

        const firstName = document.getElementById('firstName').value.trim();
        const lastName  = document.getElementById('lastName').value.trim();

        const payload = {
            name:        `${firstName} ${lastName}`,
            email:       document.getElementById('email').value.trim(),
            password:    pass,
            role:        'ADMIN',
            phone:       document.getElementById('phone').value.trim(),
            employeeId:  document.getElementById('employeeId').value.trim(),
            department:  document.getElementById('department').value,
            accessLevel: document.getElementById('accessLevel').value,
            jobTitle:    document.getElementById('jobTitle').value.trim(),
            authCode:    document.getElementById('authCode').value.trim()
        };

        try {
            const res  = await fetch(`${API}/register`, {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify(payload)
            });
            const data = await res.json();

            if (!res.ok) {
                showAlert(data.error || 'Registration failed.');
                btn.disabled = false;
                span.textContent = 'Submit Admin Registration';
                return;
            }

            showAlert('Account created! Sending OTP to your email...', 'success');
            span.textContent = '✓ OTP Sent!';

            sessionStorage.setItem('pendingEmail', payload.email);
            sessionStorage.setItem('pendingName',  payload.name);

            setTimeout(() => {
                window.location.href = 'verify-otp.html?email=' + encodeURIComponent(payload.email);
            }, 1200);

        } catch (err) {
            showAlert('Cannot connect to server. Make sure the backend is running on port 8080.');
            btn.disabled = false;
            span.textContent = 'Submit Admin Registration';
        }
    });
</script>
</body>
</html>
